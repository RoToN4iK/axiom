syntax = "proto3";

package axiom.auth;

option java_package = "me.roton.axiom.contracts.auth";
option java_multiple_files = true;

service AuthService {
    rpc RegisterAccount(RegisterAccountRequest) returns (RegisterAccountResponse);
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc RequestOtp(RequestOtpRequest) returns (RequestOtpResponse);
    rpc VerifyOtp(VerifyOtpRequest) returns (VerifyOtpResponse);
    rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
}

message RegisterAccountRequest {
    string email = 1;
    string password = 2;
}

message RegisterAccountResponse {
    string account_id = 1;
    string email = 2;
}

message LoginRequest {
    string email = 1;
    string password = 2;
}

message LoginResponse {
    string access_token = 1;
    string refresh_token = 2;
}

message RequestOtpRequest {
    string email = 1;
}

message RequestOtpResponse {
    bool sent = 1;
}

message VerifyOtpRequest {
    string email = 1;
    string code = 2;
}

message VerifyOtpResponse {
    bool valid = 1;
}

message RefreshTokenRequest {
    string refresh_token = 1;
}

message RefreshTokenResponse {
    string access_token = 1;
    string refresh_token = 2;
}