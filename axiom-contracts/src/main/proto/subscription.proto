syntax = "proto3";

package axiom.subscription;

import "common.proto";

option java_package = "me.roton.axiom.contracts.subscription";
option java_multiple_files = true;

service SubscriptionService {
    rpc CreateSubscription(CreateSubscriptionRequest) returns (SubscriptionResponse);
    rpc GetSubscription(GetSubscriptionRequest) returns (SubscriptionResponse);
    rpc CancelSubscription(CancelSubscriptionRequest) returns (SubscriptionResponse);
    rpc UpgradeSubscription(UpgradeSubscriptionRequest) returns (UpgradeSubscriptionResponse);
}

message CreateSubscriptionRequest {
    string subscriber_id = 1;
    string plan_id = 2;
}

message GetSubscriptionRequest {
    string subscription_id = 1;
}

message CancelSubscriptionRequest {
    string subscription_id = 1;
}

message SubscriptionResponse {
    string subscription_id = 1;
    string subscriber_id = 2;
    string plan_id = 3;
    axiom.common.SubscriptionStatus status = 4;
    string current_period_end = 5;
}

message UpgradeSubscriptionRequest {
    string subscription_id = 1;
    string new_plan_id = 2;
}

message UpgradeSubscriptionResponse {
    string subscription_id = 1;
    string subscriber_id = 2;
    string plan_id = 3;
    axiom.common.SubscriptionStatus status = 4;
    string current_period_end = 5;
}