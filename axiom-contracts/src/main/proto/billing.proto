syntax = "proto3";

package axiom.billing;

import "common.proto";

option java_package = "me.roton.axiom.contracts.billing";
option java_multiple_files = true;

service BillingService {
  rpc GetInvoice(GetInvoiceRequest) returns (InvoiceResponse);
}

message GetInvoiceRequest {
  string invoice_id = 1;
}

message LineItemResponse {
  string description = 1;
  axiom.common.Money amount = 2;
}

message InvoiceResponse {
  string invoice_id = 1;
  string subscription_id = 2;
  string subscriber_id = 3;
  axiom.common.Money total_amount = 4;
  axiom.common.InvoiceStatus status = 5;
  repeated LineItemResponse line_items = 6;
}