syntax = "proto3";

package axiom.plan;

import "common.proto";

option java_package = "me.roton.axiom.contracts.plan";
option java_multiple_files = true;

service PlanService {
    rpc CreatePlan(CreatePlanRequest) returns (PlanResponse);
    rpc GetPlan(GetPlanRequest) returns (PlanResponse);
    rpc ListPlans(ListPlansRequest) returns (ListPlansResponse);
}

message CreatePlanRequest {
    string name = 1;
    axiom.common.Money price = 2;
    axiom.common.BillingCycle billing_cycle = 3;
}

message GetPlanRequest {
    string plan_id = 1;
}

message ListPlansRequest {}

message PlanResponse {
    string plan_id = 1;
    string name = 2;
    axiom.common.Money price = 3;
    axiom.common.BillingCycle billing_cycle = 4;
}

message ListPlansResponse {
    repeated PlanResponse plans = 1;
}