spring.config.import=file:.env[.properties]

spring.application.name=gateway-service

server.port=8080

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASS}

spring.grpc.client.channel.auth-service.target=static://127.0.0.1:9090
spring.grpc.client.channel.subscription-service.target=static://127.0.0.1:9091
spring.grpc.client.channel.billing-service.target=static://127.0.0.1:9092