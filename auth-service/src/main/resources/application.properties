spring.config.import=file:.env[.properties]

spring.application.name=auth-service

spring.datasource.url=jdbc:postgresql://localhost:5433/axiom_auth?TimeZone=UTC
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASS}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:/db/migration

spring.grpc.server.port=9090

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASS}

axiom.jwt.secret=${AXIOM_JWT_SECRET}
axiom.jwt.access-token-ttl-minutes=15
axiom.jwt.refresh-token-ttl-days=30

axiom.otp.ttl-minutes=5
axiom.otp.length=6